services:
  code-server:
    build:
      context: .
      dockerfile: Dockerfile
      pull: true
    image: 'code-server-multilang:latest'
    pull_policy: build
    environment:
      - SERVICE_URL_CODESERVER_8443
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - PASSWORD=$SERVICE_PASSWORD_64_PASSWORDCODESERVER
      - SUDO_PASSWORD=$SERVICE_PASSWORD_SUDOCODESERVER
      - DEFAULT_WORKSPACE=/config/workspace
    volumes:
      - 'code-server-config:/config'
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://127.0.0.1:8443'
      interval: 2s
      timeout: 10s
      retries: 15